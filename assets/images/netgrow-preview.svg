		<text x="488" y="474" font-family="Poppins, Segoe UI, sans-serif" font-size="46" font-weight="800" fill="#ffffff">$1,178.00</text>
		<rect x="455" y="515" width="78" height="58" rx="16" fill="#f8fafc" stroke="#e5e7eb"/>
		<rect x="550" y="515" width="78" height="58" rx="16" fill="#f8fafc" stroke="#e5e7eb"/>
		<rect x="645" y="515" width="78" height="58" rx="16" fill="#f8fafc" stroke="#e5e7eb"/>
		<text x="494" y="550" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#2563eb">5k</text>
		<text x="589" y="550" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#10b981">1.8k</text>
		<text x="684" y="550" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="22" font-weight="800" fill="#7c3aed">8</text>
	</g>

	<g filter="url(#shadow)">
		<rect x="800" y="355" width="330" height="255" rx="30" fill="#0f172a"/>
		<text x="835" y="407" font-family="Poppins, Segoe UI, sans-serif" font-size="32" font-weight="800" fill="#ffffff">Products</text>
		<g>
			<rect x="835" y="440" width="118" height="118" rx="18" fill="#312e81"/>
			<circle cx="894" cy="485" r="38" fill="#f59e0b" opacity=".82"/>
			<rect x="854" y="515" width="78" height="24" rx="12" fill="#111827" opacity=".7"/>
			<text x="893" y="533" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="13" font-weight="800" fill="#ffffff">800 pts</text>
		</g>
