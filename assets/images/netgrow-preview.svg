			<circle cx="684" cy="162" r="24"/>
			<circle cx="590" cy="247" r="22"/>
			<circle cx="778" cy="247" r="22"/>
			<circle cx="512" cy="287" r="18"/>
			<circle cx="668" cy="287" r="18"/>
			<circle cx="700" cy="287" r="18"/>
			<circle cx="856" cy="287" r="18"/>
