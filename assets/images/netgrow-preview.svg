<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
	<title id="title">Network Marketing Management System preview</title>
	<desc id="desc">A composed preview of NetGrow mobile screens showing login, tree, earnings, and products.</desc>
	<defs>
		<linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0" stop-color="#3b82f6"/>
			<stop offset="1" stop-color="#1e3a8a"/>
		</linearGradient>
		<linearGradient id="purple" x1="0" x2="1">
			<stop offset="0" stop-color="#6366f1"/>
			<stop offset="1" stop-color="#4f46e5"/>
		</linearGradient>
		<linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
			<stop offset="0" stop-color="#064e3b"/>
			<stop offset="1" stop-color="#10b981"/>
		</linearGradient>
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".22"/>
		</filter>
	</defs>
	<rect width="1200" height="675" fill="#eff6ff"/>
	<rect x="0" y="0" width="1200" height="675" fill="url(#blue)"/>
	<circle cx="1020" cy="94" r="150" fill="#60a5fa" opacity=".2"/>
	<circle cx="166" cy="565" r="180" fill="#111827" opacity=".2"/>

	<g filter="url(#shadow)">
		<rect x="70" y="65" width="310" height="545" rx="34" fill="#ffffff"/>
		<circle cx="225" cy="142" r="58" fill="#dbeafe"/>
		<path d="M197 150l45-45v33h31l-45 45v-33z" fill="#f59e0b"/>
		<text x="225" y="225" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="46" font-weight="800" fill="#111827">NetGrow</text>
		<text x="225" y="264" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="22" fill="#6b7280">Network Marketing</text>
		<rect x="105" y="330" width="240" height="58" rx="15" fill="#f3f4f6"/>
		<text x="151" y="367" font-family="Poppins, Segoe UI, sans-serif" font-size="22" fill="#6b7280">Email or Username</text>
		<rect x="105" y="412" width="240" height="58" rx="15" fill="#f3f4f6"/>
		<text x="151" y="449" font-family="Poppins, Segoe UI, sans-serif" font-size="22" fill="#6b7280">Password</text>
		<rect x="105" y="510" width="240" height="60" rx="15" fill="url(#purple)"/>
		<text x="225" y="549" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#ffffff">LOGIN</text>
	</g>

