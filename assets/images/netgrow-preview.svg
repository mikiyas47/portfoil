			<rect x="980" y="440" width="118" height="118" rx="18" fill="#7f1d1d"/>
			<circle cx="1039" cy="485" r="38" fill="#f97316" opacity=".82"/>
			<rect x="999" y="515" width="78" height="24" rx="12" fill="#111827" opacity=".7"/>
			<text x="1038" y="533" text-anchor="middle" font-family="Poppins, Segoe UI, sans-serif" font-size="13" font-weight="800" fill="#ffffff">200 pts</text>
		</g>
		<rect x="835" y="574" width="263" height="16" rx="8" fill="#4f46e5"/>
